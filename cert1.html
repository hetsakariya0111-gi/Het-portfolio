<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate - Web Development</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@300;400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 900px; height: 600px; display: flex; justify-content: center; align-items: center; }
  .page { width: 900px; }
  .certificate {
    width: 100%; height: 600px;
    background: linear-gradient(160deg, #fdfaf4 0%, #f5edd8 40%, #fdf6e3 100%);
    position: relative;
    padding: 30px 40px;
    overflow: hidden;
    border: 15px solid #8b6914;
  }
  .border-inner { position: absolute; inset: 10px; border: 2px solid rgba(139,105,20,0.4); pointer-events: none; }
  .bg-pattern { position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, rgba(139,105,20,0.03) 0px, rgba(139,105,20,0.03) 1px, transparent 1px, transparent 10px); }
  .org { font-family: 'Josefin Sans', sans-serif; font-size: 14px; letter-spacing: 6px; color: #6b4e0a; text-align: center; margin-bottom: 20px; font-weight: bold; }
  .cert-type { font-family: 'Josefin Sans', sans-serif; font-size: 10px; letter-spacing: 8px; color: #9a7a20; text-align: center; margin-bottom: 30px; }
  .title-wrap { text-align: center; margin-bottom: 30px; }
  .title-wrap h1 { font-family: 'Bodoni Moda', serif; font-size: 44px; color: #2c1a00; font-weight: 700; }
  .awarded { text-align: center; font-family: 'Libre Baskerville', serif; font-size: 14px; color: #6b4e0a; margin-bottom: 10px; }
  .name { font-family: 'Bodoni Moda', serif; font-size: 55px; font-style: italic; color: #2c1a00; text-align: center; margin-bottom: 10px; }
  .student-meta { font-family: 'Josefin Sans', sans-serif; font-size: 12px; letter-spacing: 4px; color: #9a7a20; text-align: center; margin-bottom: 30px; }
  .footer { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 40px; margin-top: 40px; }
  .sig { text-align: center; }
  .sig-hand { font-family: 'Dancing Script', cursive; font-size: 28px; color: #1a0f00; margin-bottom: -5px; }
  .sig-line { width: 160px; height: 1.5px; background: #8b6914; margin: 0 auto 8px; }
  .sig-name { font-family: 'Josefin Sans', sans-serif; font-size: 11px; letter-spacing: 1px; color: #6b4e0a; font-weight: bold; }
  .sig-role { font-size: 9px; color: #9a7a20; font-family: 'Josefin Sans', sans-serif; }
</style>
</head>
<body>
<div class="page">
  <div class="certificate">
    <div class="bg-pattern"></div>
    <div class="border-inner"></div>
    <p class="org">ACADEMY OF MODERN TECHNOLOGY</p>
    <p class="cert-type">CERTIFICATE OF DISTINCTION</p>
    <div class="title-wrap"><h1><em>Advanced Web Development</em><br>Program</h1></div>
    <p class="awarded">Successfully conferred upon</p>
    <div class="name">Het Sakariya</div>
    <p class="student-meta">BATCH OF 2025 · CSE DEPT</p>
    <div class="footer">
      <div class="sig">
        <p class="sig-hand">R.K. Shah</p>
        <div class="sig-line"></div>
        <p class="sig-name">DR. RAJESH SHAH</p>
        <p class="sig-role">DIRECTOR ACADEMICS</p>
      </div>
      <div class="sig">
        <p class="sig-hand">S. Johnson</p>
        <div class="sig-line"></div>
        <p class="sig-name">PROF. SARAH JOHNSON</p>
        <p class="sig-role">LEAD INSTRUCTOR</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
